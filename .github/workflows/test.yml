name: Multi-Job CI Pipeline

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'requirements.txt'
      - 'go.mod'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'package.json'
      - 'requirements.txt'
      - 'go.mod'
      - '.github/workflows/**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run Node unit tests
        if: hashFiles('package.json') != ''
        run: npm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Run Node integration tests
        if: hashFiles('package.json') != ''
        run: echo "Running integration tests"

  deployment:
    name: Deployment
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm install

      - name: Build and Deploy
        run: echo "Deployment step - customize as needed"
